<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食事本 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a2f1a;
            --bg-darker: #0f1f0f;
            --accent-gold: #c9a86c;
            --accent-gold-light: #e0c090;
            --text-primary: #f5f0e8;
            --text-secondary: rgba(245, 240, 232, 0.6);
            --text-muted: rgba(245, 240, 232, 0.4);
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 24px;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 60px;
        }
        
        .logo h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .logo p {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }
        
        .login-section {
            margin-bottom: 40px;
        }
        
        .login-section h2 {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        
        .login-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: inherit;
        }
        
        .login-btn.primary {
            background: var(--accent-gold);
            border: none;
            color: var(--bg-dark);
            font-weight: 500;
        }
        
        .login-btn.primary:hover {
            background: var(--accent-gold-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201, 168, 108, 0.3);
        }
        
        .login-btn.phone {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .login-btn.phone:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        
        .login-btn.guest {
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
        }
        
        .login-btn.guest:hover {
            border-color: var(--text-secondary);
            color: var(--text-secondary);
        }
        
        .login-btn svg {
            width: 24px;
            height: 24px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .divider span {
            padding: 0 16px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 31, 15, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: rgba(30, 50, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 500;
        }
        
        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .close-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-align: left;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(201, 168, 108, 0.05);
        }
        
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-gold);
            border: none;
            border-radius: 10px;
            color: var(--bg-dark);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .submit-btn:hover {
            background: var(--accent-gold-light);
            transform: translateY(-2px);
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: left;
        }
        
        .success-msg {
            color: #51cf66;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: left;
        }
        
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--accent-gold);
            color: var(--bg-dark);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .guest-warning {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .guest-warning h4 {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .guest-warning p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .demo-hint {
            background: rgba(201, 168, 108, 0.1);
            border: 1px solid rgba(201, 168, 108, 0.2);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>食事本</h1>
            <p>今天有在好好吃饭吗</p>
        </div>

        <div class="login-section">
            <div class="login-buttons">
                <button class="login-btn phone" id="phoneLogin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                        <line x1="12" y1="18" x2="12.01" y2="18"/>
                    </svg>
                    注册/登录
                </button>

                <div class="divider"><span>或</span></div>

                <div class="guest-warning">
                    <h4>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        游客模式说明
                    </h4>
                    <p>游客可以体验完整功能，但数据保存在当前浏览器中。换设备或清除缓存后数据会丢失。</p>
                </div>

                <button class="login-btn guest" id="guestLogin">
                    游客体验
                </button>
            </div>

            <div class="demo-hint">
                <strong>简单模式</strong>：输入手机号和昵称，一键登录注册
            </div>
        </div>
    </div>

    <div class="modal" id="phoneModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>快速登录</h3>
                <button class="close-btn" onclick="closePhoneModal()">&times;</button>
            </div>

            <form id="phoneForm">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="phoneNumber" placeholder="请输入手机号（用于标识用户）" maxlength="11">
                </div>

                <div class="form-group">
                    <label>昵称（可选）</label>
                    <input type="text" id="nickname" placeholder="起个好听的名字吧" maxlength="20">
                </div>

                <button type="submit" class="submit-btn" id="phoneSubmitBtn">立即登录</button>
                <p class="error-msg" id="phoneError"></p>
                <p class="success-msg" id="phoneSuccess"></p>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="localstorage.js"></script>

    <script>
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        document.getElementById('phoneLogin').addEventListener('click', () => {
            document.getElementById('phoneModal').classList.add('active');
        });

        function closePhoneModal() {
            document.getElementById('phoneModal').classList.remove('active');
            document.getElementById('phoneForm').reset();
            document.getElementById('phoneError').textContent = '';
            document.getElementById('phoneSuccess').textContent = '';
        }

        document.getElementById('phoneForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phoneNumber').value.trim();
            const nickname = document.getElementById('nickname').value.trim() || '用户' + phone.slice(-4);
            const btn = document.getElementById('phoneSubmitBtn');
            
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                document.getElementById('phoneError').textContent = '请输入正确的手机号';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 登录中...';
            document.getElementById('phoneError').textContent = '';
            
            try {
                const result = LocalStorageManager.registerUser(phone, nickname);
                
                if (result.success) {
                    const msg = result.isNew ? '注册成功！' : '欢迎回来！';
                    showToast(msg);
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    
                    closePhoneModal();
                }
            } catch (error) {
                console.error('登录失败:', error);
                btn.disabled = false;
                btn.textContent = '立即登录';
                document.getElementById('phoneError').textContent = '登录失败，请重试';
            }
        });

        document.getElementById('guestLogin').addEventListener('click', () => {
            LocalStorageManager.createGuestUser();
            showToast('即将以游客模式进入...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        });
    </script>
</body>
</html>
