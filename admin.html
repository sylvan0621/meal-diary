<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食事本 - 管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a2f1a;
            --bg-darker: #0f1f0f;
            --bg-card: #233d23;
            --accent-gold: #c9a86c;
            --accent-gold-light: #e0c090;
            --text-primary: #f5f0e8;
            --text-secondary: rgba(245, 240, 232, 0.6);
            --text-muted: rgba(245, 240, 232, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--card-border);
        }
        
        .admin-header h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 0.2em;
        }
        
        .admin-header .actions {
            display: flex;
            gap: 16px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            border: none;
        }
        
        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-dark);
            font-weight: 500;
        }
        
        .btn-primary:hover {
            background: var(--accent-gold-light);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
        }
        
        .btn-outline:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        
        .btn-danger {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }
        
        .btn-danger:hover {
            background: rgba(255, 107, 107, 0.2);
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }
        
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 500;
            color: var(--accent-gold);
            margin-bottom: 8px;
        }
        
        .stat-card .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        /* 主要内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
            margin-bottom: 32px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .panel-header h3 {
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        /* 分类分布 */
        .category-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .category-info {
            flex: 1;
        }
        
        .category-name {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        
        .category-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .category-fill {
            height: 100%;
            background: var(--accent-gold);
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .category-stats {
            text-align: right;
        }
        
        .category-count {
            font-weight: 500;
        }
        
        .category-percent {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* 活动记录 */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent-gold);
            color: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        
        .activity-info {
            flex: 1;
            min-width: 0;
        }
        
        .activity-text {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .activity-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* 表格 */
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
        }
        
        th {
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        td {
            font-size: 0.9rem;
        }
        
        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-info {
            background: rgba(201, 168, 108, 0.15);
            color: var(--accent-gold);
        }
        
        .badge-success {
            background: rgba(81, 207, 102, 0.15);
            color: #51cf66;
        }
        
        .badge-warning {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        
        .badge-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }
        
        /* 搜索框 */
        .search-box {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: inherit;
            margin-bottom: 16px;
            width: 100%;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--accent-gold);
        }
        
        .search-box::placeholder {
            color: var(--text-muted);
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .page-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--card-border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .page-btn:hover:not(.active) {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        
        .page-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-dark);
        }
        
        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--accent-gold);
            color: var(--bg-dark);
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 2000;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        
        .tab-header {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: var(--bg-dark);
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>管理后台</h1>
            <div class="actions">
                <button class="btn btn-outline" onclick="loadDashboardData()">刷新数据</button>
                <button class="btn btn-danger" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalRecords">0</div>
                <div class="stat-label">总记录数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="todayRecords">0</div>
                <div class="stat-label">今日记录</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeUsers">0</div>
                <div class="stat-label">今日活跃</div>
            </div>
        </div>
        
        <!-- 主要内容区 -->
        <div class="main-content">
            <!-- 分类分布 -->
            <div class="panel">
                <div class="panel-header">
                    <h3>记录类型分布</h3>
                </div>
                
                <div class="category-bar-item">
                    <div class="category-row">
                        <span>糊弄</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="hudunBar"></div>
                        </div>
                        <span id="hudunCount">0</span>
                        <span id="hudunPercent">0%</span>
                    </div>
                    
                    <div class="category-row">
                        <span>健康</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="healthBar"></div>
                        </div>
                        <span id="healthCount">0</span>
                        <span id="healthPercent">0%</span>
                    </div>
                    
                    <div class="category-row">
                        <span>大餐</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="feastBar"></div>
                        </div>
                        <span id="feastCount">0</span>
                        <span id="feastPercent">0%</span>
                    </div>
                    
                    <div class="category-row">
                        <span>外卖</span>
                        <div class="bar-container">
                            <div class="bar-fill" id="takeoutBar"></div>
                        </div>
                        <span id="takeoutCount">0</span>
                        <span id="takeoutPercent">0%</span>
                    </div>
                </div>
            </div>
            
            <!-- 登录方式分布 -->
            <div class="panel">
                <div class="panel-header">
                    <h3>登录方式分布</h3>
                </div>
                <div id="loginMethods"></div>
            </div>
        </div>
        
        <!-- 活动记录 -->
        <div class="main-content">
            <!-- 最近用户 -->
            <div class="panel">
                <div class="panel-header">
                    <h3>最近注册用户</h3>
                </div>
                <div class="activity-list" id="recentUsers"></div>
            </div>
            
            <!-- 最近记录 -->
            <div class="panel">
                <div class="panel-header">
                    <h3>最近记录</h3>
                </div>
                <div class="activity-list" id="recentMeals"></div>
            </div>
        </div>
        
        <!-- 用户列表 -->
        <div class="panel">
            <div class="panel-header">
                <h3>用户列表</h3>
                <button class="btn btn-outline" onclick="exportUsers()">导出 CSV</button>
            </div>
            <input type="text" class="search-box" id="userSearch" placeholder="搜索用户..." oninput="filterUsers()">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>用户</th>
                            <th>登录方式</th>
                            <th>记录数</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="usersPagination"></div>
        </div>
        
        <!-- 记录列表 -->
        <div class="panel">
            <div class="panel-header">
                <h3>记录列表</h3>
                <button class="btn btn-outline" onclick="exportRecords()">导出 CSV</button>
            </div>
            <input type="text" class="search-box" id="recordSearch" placeholder="搜索记录..." oninput="filterRecords()">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>餐次</th>
                            <th>类型</th>
                            <th>内容</th>
                            <th>用户</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="recordsPagination"></div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="localstorage.js"></script>
    
    <script>
        let allUsers = [];
        let allRecords = [];
        let currentUserPage = 1;
        let currentRecordPage = 1;
        const pageSize = 10;
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
        
        // 检查权限并加载数据
        document.addEventListener('DOMContentLoaded', () => {
            const user = LocalStorageManager.getUser();
            if (!user || !LocalStorageManager.checkAdmin(user.uid)) {
                showToast('无管理员权限');
                setTimeout(() => window.location.href = 'index.html', 1500);
                return;
            }
            loadDashboardData();
            loadRecentUsers();
            loadRecentMeals();
            loadLoginMethods();
            loadUsers();
            loadRecords();
        });
        
        // 加载仪表盘数据
        async function loadDashboardData() {
            const stats = LocalStorageManager.getStats();
            const categoryStats = LocalStorageManager.getCategoryStats();
            
            document.getElementById('totalUsers').textContent = stats.totalUsers;
            document.getElementById('totalRecords').textContent = stats.totalRecords;
            document.getElementById('todayRecords').textContent = stats.todayRecords;
            document.getElementById('activeUsers').textContent = stats.activeUsers;
            
            const total = stats.totalRecords || 1;
            const categories = ['hudun', 'health', 'feast', 'takeout'];
            
            categories.forEach(cat => {
                const count = categoryStats[cat];
                const percent = Math.round((count / total) * 100);
                document.getElementById(`${cat}Count`).textContent = count;
                document.getElementById(`${cat}Percent`).textContent = `${percent}%`;
                document.getElementById(`${cat}Bar`).style.width = `${percent}%`;
            });
        }
        
        // 加载最近用户
        function loadRecentUsers() {
            const users = LocalStorageManager.getAllUsers();
            const recent = users.slice(-5).reverse();
            
            const container = document.getElementById('recentUsers');
            
            if (recent.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">暂无数据</p>';
                return;
            }
            
            let html = '';
            recent.forEach(user => {
                const displayName = user.displayName || '用户' + user.uid.slice(-4);
                const time = formatTime(user.createdAt);
                
                html += `
                    <div class="activity-item">
                        <div class="user-avatar">${(displayName || '用户').slice(0, 1)}</div>
                        <div class="activity-info">
                            <div class="activity-text">${displayName}</div>
                            <div class="activity-time">${time}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 加载最近记录
        function loadRecentMeals() {
            const meals = LocalStorageManager.getAllMeals();
            const recent = meals.slice(-5).reverse();
            
            const container = document.getElementById('recentMeals');
            
            if (recent.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">暂无数据</p>';
                return;
            }
            
            let html = '';
            recent.forEach(meal => {
                const time = formatTime(meal.timestamp);
                const tagName = { hudun: '糊弄', health: '健康', feast: '大餐', takeout: '外卖' }[meal.tag] || '未知';
                const mealType = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' }[meal.mealType] || '';
                
                html += `
                    <div class="activity-item">
                        <div class="activity-icon" style="background: rgba(201, 168, 108, 0.2);">🍽️</div>
                        <div class="activity-info">
                            <div class="activity-text">${mealType} ${tagName}</div>
                            <div class="activity-time">${time}</div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 加载登录方式分布
        function loadLoginMethods() {
            const users = LocalStorageManager.getAllUsers();
            
            let phone = 0, guest = 0;
            
            users.forEach(user => {
                if (user.phone) phone++;
                else if (user.isGuest) guest++;
            });
            
            const total = users.length || 1;
            
            const html = `
                <div class="category-item">
                    <div class="category-icon" style="background: rgba(201, 168, 108, 0.2);">📞</div>
                    <div class="category-info">
                        <div class="category-name">手机登录</div>
                        <div class="category-bar">
                            <div class="category-fill" style="width: ${Math.round(phone/total*100)}%"></div>
                        </div>
                    </div>
                    <div class="category-stats">
                        <div class="category-count">${phone}</div>
                        <div class="category-percent">${Math.round(phone/total*100)}%</div>
                    </div>
                </div>
                
                <div class="category-item">
                    <div class="category-icon" style="background: rgba(255, 255, 255, 0.1);">👤</div>
                    <div class="category-info">
                        <div class="category-name">游客</div>
                        <div class="category-bar">
                            <div class="category-fill" style="background: var(--text-muted); width: ${Math.round(guest/total*100)}%"></div>
                        </div>
                    </div>
                    <div class="category-stats">
                        <div class="category-count">${guest}</div>
                        <div class="category-percent">${Math.round(guest/total*100)}%</div>
                    </div>
                </div>
            `;
            
            document.getElementById('loginMethods').innerHTML = html;
        }
        
        // 加载用户列表
        function loadUsers() {
            allUsers = LocalStorageManager.getAllUsers();
            renderUsers();
        }
        
        // 渲染用户列表
        function renderUsers() {
            const filtered = filterUsersList();
            const start = (currentUserPage - 1) * pageSize;
            const pageUsers = filtered.slice(start, start + pageSize);
            
            const tbody = document.getElementById('usersTableBody');
            
            if (pageUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">暂无用户数据</td></tr>';
                return;
            }
            
            let html = '';
            pageUsers.forEach(user => {
                const loginType = user.phone ? '手机登录' : (user.isGuest ? '游客' : '未知');
                const loginBadge = user.phone ? 'badge-info' : (user.isGuest ? 'badge-warning' : 'badge-secondary');
                
                const recordsCount = allRecords.filter(r => r.userId === user.uid).length;
                const firstRecord = user.createdAt ? formatDate(user.createdAt) : '-';
                
                html += `
                    <tr>
                        <td>
                            <div class="user-cell">
                                <div class="user-avatar">${(user.displayName || '用户').slice(0, 1)}</div>
                                <div>
                                    <div style="font-weight: 500;">${user.displayName}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-muted);">${user.uid.slice(0, 8)}...</div>
                                </div>
                            </div>
                        </td>
                        <td><span class="badge ${loginBadge}">${loginType}</span></td>
                        <td>${recordsCount}</td>
                        <td>${firstRecord}</td>
                        <td>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem;" onclick="viewUserMeals('${user.uid}')">查看记录</button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
            renderPagination('usersPagination', Math.ceil(filtered.length / pageSize), currentUserPage, (page) => {
                currentUserPage = page;
                renderUsers();
            });
        }
        
        function filterUsers() {
            currentUserPage = 1;
            renderUsers();
        }
        
        function filterUsersList() {
            const search = document.getElementById('userSearch').value.toLowerCase();
            if (!search) return allUsers;
            return allUsers.filter(u => 
                (u.displayName || '').toLowerCase().includes(search) ||
                (u.phone || '').includes(search)
            );
        }
        
        // 加载记录列表
        function loadRecords() {
            allRecords = LocalStorageManager.getAllMeals();
            renderRecords();
        }
        
        // 渲染记录列表
        function renderRecords(filteredRecords) {
            const records = filteredRecords || allRecords;
            const start = (currentRecordPage - 1) * pageSize;
            const pageRecords = records.slice(start, start + pageSize);
            
            const tbody = document.getElementById('recordsTableBody');
            
            if (pageRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">暂无记录数据</td></tr>';
                return;
            }
            
            let html = '';
            pageRecords.forEach(record => {
                const tagName = { hudun: '糊弄', health: '健康', feast: '大餐', takeout: '外卖' }[record.tag] || '未知';
                const mealType = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' }[record.mealType] || '';
                const user = allUsers.find(u => u.uid === record.userId);
                const userName = user ? user.displayName : '未知';
                
                html += `
                    <tr>
                        <td>${record.date || formatDate(record.timestamp)}</td>
                        <td>${mealType}</td>
                        <td><span class="badge badge-info">${tagName}</span></td>
                        <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${record.text || '-'}</td>
                        <td>${userName}</td>
                        <td>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem;" onclick="deleteRecord('${record.id}')">删除</button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
            renderPagination('recordsPagination', Math.ceil(records.length / pageSize), currentRecordPage, (page) => {
                currentRecordPage = page;
                renderRecords(filteredRecords);
            });
        }
        
        // 搜索记录
        function filterRecords() {
            const search = document.getElementById('recordSearch').value.toLowerCase();
            currentRecordPage = 1;
            
            if (!search) {
                renderRecords();
                return;
            }
            
            const filtered = allRecords.filter(r => 
                (r.text || '').toLowerCase().includes(search) ||
                (r.date || '').includes(search)
            );
            
            renderRecords(filtered);
        }
        
        // 查看用户记录
        function viewUserMeals(userId) {
            currentRecordPage = 1;
            const filtered = allRecords.filter(r => r.userId === userId);
            if (filtered.length === 0) {
                showToast('该用户暂无记录');
                return;
            }
            
            const start = 0;
            const pageRecords = filtered.slice(start, start + pageSize);
            
            const tbody = document.getElementById('recordsTableBody');
            let html = `<tr><td colspan="6" style="background: rgba(201, 168, 108, 0.1); text-align: left;"><strong>筛选结果：</strong> ${filtered.length} 条记录 <button onclick="loadRecords();" style="margin-left: 20px; padding: 4px 12px; background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); border-radius: 4px; cursor: pointer;">清除筛选</button></td></tr>`;
            
            pageRecords.forEach(record => {
                const tagName = { hudun: '糊弄', health: '健康', feast: '大餐', takeout: '外卖' }[record.tag] || '未知';
                const mealType = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' }[record.mealType] || '';
                
                html += `
                    <tr>
                        <td>${record.date || formatDate(record.timestamp)}</td>
                        <td>${mealType}</td>
                        <td><span class="badge badge-info">${tagName}</span></td>
                        <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${record.text || '-'}</td>
                        <td>该用户</td>
                        <td>
                            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 0.8rem;" onclick="deleteRecord('${record.id}')">删除</button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // 删除记录
        function deleteRecord(recordId) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            LocalStorageManager.deleteMeal(recordId);
            showToast('删除成功');
            loadRecords();
            loadDashboardData();
        }
        
        // 导出用户
        function exportUsers() {
            const users = LocalStorageManager.getAllUsers();
            const csv = [
                ['用户ID', '昵称', '登录方式', '注册时间'].join(','),
                ...users.map(u => [
                    u.uid,
                    u.displayName || '',
                    u.phone ? '手机登录' : '游客',
                    u.createdAt ? formatDate(u.createdAt) : ''
                ].join(','))
            ].join('\n');
            
            downloadFile(csv, 'users.csv', 'text/csv');
            showToast('导出成功');
        }
        
        // 导出记录
        function exportRecords() {
            const meals = LocalStorageManager.getAllMeals();
            const csv = [
                ['日期', '餐次', '类型', '内容', '用户ID'].join(','),
                ...meals.map(r => [
                    r.date || '',
                    { breakfast: '早餐', lunch: '午餐', dinner: '晚餐' }[r.mealType] || '',
                    { hudun: '糊弄', health: '健康', feast: '大餐', takeout: '外卖' }[r.tag] || '',
                    (r.text || '').replace(/,/g, '，'),
                    r.userId || ''
                ].join(','))
            ].join('\n');
            
            downloadFile(csv, 'meals.csv', 'text/csv');
            showToast('导出成功');
        }
        
        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 工具函数
        function formatTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
            if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
            if (diff < 604800000) return `${Math.floor(diff/86400000)}天前`;
            return formatDate(dateStr);
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return `${d.getMonth()+1}/${d.getDate()}`;
        }
        
        function renderPagination(containerId, totalPages, currentPage, onPageChange) {
            const container = document.getElementById(containerId);
            
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            // 上一页
            html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="onPageChange(${currentPage - 1})">←</button>`;
            
            // 页码
            for (let i = 1; i <= totalPages; i++) {
                if (i === currentPage) {
                    html += `<button class="page-btn active">${i}</button>`;
                } else {
                    html += `<button class="page-btn" onclick="onPageChange(${i})">${i}</button>`;
                }
            }
            
            // 下一页
            html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="onPageChange(${currentPage + 1})">→</button>`;
            
            container.innerHTML = html;
        }
        
        // 退出登录
        function logout() {
            LocalStorageManager.logout();
            window.location.href = 'login.html';
        }
    </script>

            width: 40px;
            font-size: 0.9rem;

        .bar-container {
            flex: 1;
            height: 8px;

            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            background: var(--accent-gold);
            border-radius: 4px;
            transition: width 0.3s ease;

        .category-row span:nth-child(3) {
            width: 30px;
            text-align: right;
            font-weight: 500;
        }
        
        .category-row span:nth-child(4) {
            width: 45px;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</body>
